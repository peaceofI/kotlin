name: Build BarakahFocus APK

# When this workflow runs
on:
  # Automatically on every push to main branch
  push:
    branches: [ main ]
  
  # Allow manual trigger from GitHub website
  workflow_dispatch:

# Environment variables
env:
  MAIN_MODULE: app
  APK_NAME: BarakahFocus

jobs:
  build:
    name: Build APK
    # Use Ubuntu Linux runner (free)
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Download your code
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Step 2: Set up Java 17 (required for your project)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      # Step 3: Make gradlew executable
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      # Step 4: Build debug APK (unsigned, for testing)
      - name: Build Debug APK
        run: ./gradlew assembleDebug
      
      # Step 5: Upload debug APK as artifact
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}-debug
          path: ${{ env.MAIN_MODULE }}/build/outputs/apk/debug/*.apk
          if-no-files-found: error
      
      # Step 6: Build release APK (unsigned)
      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease
      
      # Step 7: Upload release APK as artifact
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}-release-unsigned
          path: ${{ env.MAIN_MODULE }}/build/outputs/apk/release/*.apk
          if-no-files-found: error
      
      # Optional: Display build output location
      - name: Display structure of built files
        run: ls -R ${{ env.MAIN_MODULE }}/build/outputs/apk/
